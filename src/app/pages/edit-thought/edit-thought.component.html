<section *ngIf="thought" class="container editar-pensamentos ff-inter">
  <header class="header">
    <h2>Edite o pensamento:</h2>
  </header>
  <form  [formGroup]="editForm" >
    <label for="pensamento">Pensamento</label>
    <input
      formControlName="content"
      type="textarea"
      class="input"
      id="pensamento"
      placeholder="Digite o pensamento"
    >
    <base-form-validator [form]="editForm.controls.content" ></base-form-validator>
    <label for="autoria">Autoria ou fonte</label>
    <input
      formControlName="author"
      type="text"
      class="input"
      id="autoria"
      placeholder="Digite a autoria ou fonte"
    >
    <base-form-validator [form]="editForm.controls.author" ></base-form-validator>
    <label for="modelo">Selecione o modelo do card:</label>
    <div class="container-radio">
      <div class="radio-modelo">
        <label for="modelo1">
          <input
          formControlName="template"
            type="radio"
            id="modelo1"
            value="modelo1"
          >
          <div class="custom-radio">
            <span></span>
          </div>
          <span>Modelo 1</span>
        </label>
        Prévia:
        <div class="modelo modelo1 ff-roboto-mono">
          <img src="../../../../assets/imagens/modelo1.png" alt="Aspas azuis">
          <p class="conteudo">Lars noti ufund denis dendus</p>
          <p class="autoria"><b>Patrick Norris</b></p>
        </div>
      </div>

      <div class="radio-modelo">
        <label for="modelo2">
          <input
            formControlName="template"
            type="radio"
            id="modelo2"
            value="modelo2"
          >
          <div class="custom-radio">
            <span></span>
          </div>
          <span>Modelo 2</span>
        </label>
        Prévia:
        <div class="modelo modelo2 ff-roboto-mono">
          <img src="../../../../assets/imagens/modelo2.png" alt="Aspas azul claro">
          <p class="conteudo">Est edum no conversum tod id nof zumums</p>
          <p class="autoria"><b>Lorry Clark</b></p>
        </div>
      </div>

      <div class="radio-modelo">
        <label for="modelo3">
          <input
          formControlName="template"
            type="radio"
            id="modelo3"
            value="modelo3"
          >
          <div class="custom-radio">
            <span></span>
          </div>
          <span>Modelo 3</span>
        </label>
        Prévia:
        <div class="modelo modelo3 ff-roboto-mono">
          <img src="../../../../assets/imagens/modelo3.png" alt="Aspas verdes">
          <p class="conteudo">Lorem ipsum cacilds fonzois</p>
          <p class="autoria"><b>Abigail P. Assis</b></p>
        </div>
      </div>
    </div>
    <div class="acoes">
      <button [class.botao__desabilitado]="editForm.invalid" class="botao" (click)="edit()" >Salvar</button>
      <button  class="botao" (click)="cancel()" >Cancelar</button>
    </div>
  </form>
</section>

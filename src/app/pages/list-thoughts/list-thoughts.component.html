
<section class="container">
  <header class="header d-flex">
    <h2 class="ff-inter">Meu Mural</h2>
    <button routerLink="/home/create-thought" class="botao">Adicionar pensamento</button>
  </header>
  <div class="mural" *ngIf="thoughtsList.length > 0, else semPensamentos">
    <div *ngFor="let thought of thoughtsList">
      <app-thoughts-card [thoughts]="thought" ></app-thoughts-card>
    </div>
  </div>
</section>
<ng-template #semPensamentos>
  <div class="ff-inter sem-pensamentos">
    <p>Ainda não há pensamentos cadastrados!</p>
  </div>
</ng-template>
